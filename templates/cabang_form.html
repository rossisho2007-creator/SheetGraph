{% extends "base.html" %}
{% block title %}Online Form - TAF AutoInput{% endblock %}
{% block content %}

<div style="display:flex; justify-content:space-between; margin-bottom:16px;">
    <div>
        <h4 style="color:var(--blue);">📝 Online Submission Form</h4>
        <small style="color:#666;">{{ session.name }} | {{ session.branch }}</small>
    </div>
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary">← Back</a>
</div>

<div class="card-stat blue" style="text-align:left;">
    <form onsubmit="submitForm(event)">
        <div class="row g-2">
            <div class="col-6">
                <label class="form-label fw-bold" style="font-size:12px;">NPK</label>
                <input type="text" name="npk" class="form-control" required>
            </div>
            <div class="col-6">
                <label class="form-label fw-bold" style="font-size:12px;">KPM ID</label>
                <input type="text" name="kpm_id" class="form-control" required>
            </div>
            <div class="col-12">
                <label class="form-label fw-bold" style="font-size:12px;">Nama Lengkap</label>
                <input type="text" name="nama_lengkap" class="form-control" required>
            </div>
            <div class="col-6">
                <label class="form-label fw-bold" style="font-size:12px;">Loan Amount (Rp)</label>
                <input type="number" name="loan_amount" class="form-control" required oninput="calcLive()" id="loan">
            </div>
            <div class="col-6">
                <label class="form-label fw-bold" style="font-size:12px;">Down Payment (Rp)</label>
                <input type="number" name="down_payment" class="form-control" required oninput="calcLive()" id="dp">
            </div>
            <div class="col-6">
                <label class="form-label fw-bold" style="font-size:12px;">Tanggal Mulai</label>
                <input type="date" name="tanggal_mulai" class="form-control" required>
            </div>
            <div class="col-3">
                <label class="form-label fw-bold" style="font-size:12px;">Tenor</label>
                <input type="number" name="tenure_months" class="form-control" value="36" oninput="calcLive()" id="tenor">
            </div>
            <div class="col-3">
                <label class="form-label fw-bold" style="font-size:12px;">Rate %</label>
                <input type="number" name="interest_rate" class="form-control" value="5" step="0.1" oninput="calcLive()" id="rate">
            </div>
            <div class="col-12">
                <label class="form-label fw-bold" style="font-size:12px;">Loan Type</label>
                <select name="loan_type" class="form-control">
                    <option>Kredit Kepemilikan Motor</option>
                    <option>Regular</option><option>Fleet</option>
                </select>
            </div>
        </div>
        
        <div id="liveCalc" style="display:none; margin-top:12px; padding:12px; background:#d4edda; border-radius:8px;">
            <strong>🧮 Live Calculation:</strong> 
            Monthly: <strong style="color:#DC3545;" id="liveMonthly">Rp 0</strong>
        </div>
        
        <button type="submit" class="btn-block btn-red mt-3">Submit</button>
    </form>
</div>

<script>
function calcLive() {
    const loan = parseFloat(document.getElementById('loan').value) || 0;
    const dp = parseFloat(document.getElementById('dp').value) || 0;
    const tenor = parseInt(document.getElementById('tenor').value) || 12;
    const rate = (parseFloat(document.getElementById('rate').value) || 5) / 100;
    
    if (loan > 0) {
        document.getElementById('liveCalc').style.display = 'block';
        const principal = loan - dp;
        const totalInt = principal * rate * (tenor / 12);
        const monthly = (principal + totalInt) / tenor;
        document.getElementById('liveMonthly').textContent = 'Rp ' + Math.round(monthly).toLocaleString('id-ID');
    }
}

function submitForm(e) {
    e.preventDefault();
    const d = Object.fromEntries(new FormData(e.target));
    d.loan_amount = parseFloat(d.loan_amount);
    d.down_payment = parseFloat(d.down_payment);
    d.tenure_months = parseInt(d.tenure_months);
    d.interest_rate = parseFloat(d.interest_rate) / 100;
    d.document_source = 'Online Form';
    
    fetch('/api/submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(d)
    })
    .then(r => r.json())
    .then(res => {
        if (res.status === 'success') {
            alert('✅ Submitted! ID: ' + res.application_id);
            window.location.href = '/dashboard';
        } else {
            alert('Error: ' + res.message);
        }
    });
}
</script>
{% endblock %}
