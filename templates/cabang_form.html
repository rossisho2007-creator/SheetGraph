{% extends "base.html" %}
{% block title %}Formulir{% endblock %}
{% block content %}

<div style="max-width:600px; margin:0 auto;">

<div style="text-align:center; padding:10px 0 20px;">
    <h4 style="font-weight:700; color:var(--blue);">Formulir Pengajuan</h4>
    <p style="color:#999; font-size:13px;">{{ session.name }} · {{ session.branch }}</p>
</div>

<div style="background:#fff; border:1px solid #E5E7EB; border-radius:16px; padding:24px;">

    <form onsubmit="submitForm(event)">
        
        <div class="mb-3">
            <label style="font-weight:600; font-size:13px; color:#555; display:block; margin-bottom:4px;">Tipe Karyawan</label>
            <select name="employee_type" required onchange="updateRate(this.value)" style="width:100%; padding:12px; border:1px solid #E5E7EB; border-radius:12px; font-size:15px; background:#fff;">
                <option value="">Pilih tipe karyawan...</option>
                <option value="field">🏍️ Operasional (Bunga 5%)</option>
                <option value="office">💼 Non-Operasional (Bunga 5%)</option>
            </select>
        </div>
        
        <div id="programInfo" style="display:none; padding:12px 16px; border-radius:12px; margin-bottom:14px; font-size:13px;"></div>
        
        <div style="font-weight:700; color:var(--blue); font-size:14px; margin:16px 0 10px;">👤 Data Karyawan</div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;">
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">NPK *</label>
                <input type="text" name="npk" required style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">Nama Lengkap *</label>
                <input type="text" name="nama_lengkap" required style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">Jabatan / Gol</label>
                <input type="text" name="jabatan_gol" placeholder="cth. FRO/2D" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">Departemen</label>
                <input type="text" name="departemen_cabang" placeholder="cth. AR Management" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <div style="grid-column:1/-1;">
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">Cabang</label>
                <input type="text" name="cabang" value="{{ session.branch }}" readonly style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px; background:#F8F9FA;">
            </div>
        </div>

        <div style="font-weight:700; color:var(--blue); font-size:14px; margin:16px 0 10px;">📞 Kontak</div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;">
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">Email</label>
                <input type="email" name="email" placeholder="nama@email.com" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">No. HP / WhatsApp</label>
                <input type="tel" name="phone" placeholder="08xxxxxxxxxx" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
        </div>
        
        <div style="font-weight:700; color:var(--blue); font-size:14px; margin:16px 0 10px;">🏍️ Data Kendaraan</div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;">
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">Tipe Motor</label>
                <input type="text" name="type_motor" placeholder="cth. Honda Beat" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">No. Rangka</label>
                <input type="text" name="no_rangka" placeholder="Nomor rangka" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">No. Mesin</label>
                <input type="text" name="no_mesin" placeholder="Nomor mesin" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">BPKB</label>
                <input type="text" name="bpkb" placeholder="Nomor BPKB" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
        </div>
        
        <div style="font-weight:700; color:var(--blue); font-size:14px; margin:16px 0 10px;">💰 Rincian Pinjaman <small style="color:#28A745; font-weight:400;">Bunga 5%</small></div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;">
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">Jumlah Pinjaman (Rp) *</label>
                <input type="text" name="loan_amount" id="loan" required oninput="calcLive()" inputmode="numeric" placeholder="16000000" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">Uang Muka (Rp)</label>
                <input type="text" name="down_payment" id="dp" oninput="calcLive()" inputmode="numeric" placeholder="0" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">Tenor (bulan)</label>
                <input type="text" name="tenure_months" id="tenor" value="36" oninput="calcLive()" inputmode="numeric" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">Suku Bunga (%)</label>
                <input type="text" value="5%" readonly style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px; background:#F5F5F5; color:#999;">
            </div>
            <div>
                <label style="font-weight:600; font-size:12px; color:#555; display:block; margin-bottom:3px;">Tanggal Mulai</label>
                <input type="date" name="tanggal_mulai" style="width:100%; padding:11px; border:1px solid #E5E7EB; border-radius:10px; font-size:14px;">
            </div>
            <input type="hidden" name="interest_rate" value="5">
        </div>
        
        <div id="liveCalc" style="display:none; padding:16px; background:#F0FDF4; border-radius:12px; margin-bottom:14px; text-align:center;">
            <small style="color:#166534;">🧮 Angsuran Bulanan</small><br>
            <strong style="color:#DC3545; font-size:22px;" id="liveMonthly">Rp 0</strong>
        </div>
        
        <button type="submit" style="width:100%; padding:16px; background:#DC3545; color:white; border:none; border-radius:50px; font-size:16px; font-weight:700; cursor:pointer;">
            Kirim Pengajuan
        </button>
    </form>
</div>

</div>

<script>
function updateRate(type){const i=document.getElementById("programInfo");if(type==="field"){i.style.display="block";i.style.background="#F0FDF4";i.innerHTML='<strong style="color:#166534;">🏍️ Operasional</strong><br><small style="color:#166534;">16Jt · Bunga 5% · 36 bulan · Tanpa DP</small>';}else if(type==="office"){i.style.display="block";i.style.background="#FFF7ED";i.innerHTML='<strong style="color:#9A3412;">💼 Non-Operasional</strong><br><small style="color:#9A3412;">Nominal variabel · Bunga 5% · Maks 48 bulan</small>';}}
function calcLive(){const l=parseFloat((document.getElementById("loan").value||"").replace(/[^0-9]/g,""))||0;const d=parseFloat((document.getElementById("dp").value||"").replace(/[^0-9]/g,""))||0;const t=parseInt((document.getElementById("tenor").value||"").replace(/[^0-9]/g,""))||36;if(l>0){document.getElementById("liveCalc").style.display="block";const p=l-d,i=p*0.05*(t/12),m=(p+i)/t;document.getElementById("liveMonthly").textContent="Rp "+Math.round(m).toLocaleString("id-ID");}}
function submitForm(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));d.loan_amount=parseFloat((d.loan_amount||"").replace(/[^0-9]/g,""))||0;d.down_payment=parseFloat((d.down_payment||"").replace(/[^0-9]/g,""))||0;d.tenure_months=parseInt((d.tenure_months||"").replace(/[^0-9]/g,""))||36;d.interest_rate=0.05;d.document_source="Formulir";fetch("/api/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).then(r=>r.json()).then(res=>{if(res.status==="success"){alert("✅ Terkirim!");window.location.href="/dashboard";}});}
</script>
{% endblock %}
