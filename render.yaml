services:
  - type: web
    name: taf-scanner
    env: python
    buildCommand: |
      apt-get update -y && apt-get install -y tesseract-ocr tesseract-ocr-ind
      pip install --upgrade pip
      pip install flask flask-cors pandas openpyxl pillow gunicorn werkzeug
      pip install pytesseract --no-deps
      pip install pytesseract
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
