{% extends "base.html" %}
{% block title %}Masuk{% endblock %}
{% block content %}

<div style="max-width:400px; margin:60px auto;">
    <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="max-height:55px;" onerror="this.style.display='none'">
        <h4 style="color:var(--blue); margin-top:12px; font-weight:700;">Portal Karyawan</h4>
        <p style="color:#999; font-size:13px;">Masuk untuk melanjutkan</p>
    </div>

    <div class="card" style="padding:24px;">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nama Pengguna / NPK <span style="color:var(--red);">*</span></label>
                <input type="text" name="username" class="form-control" placeholder="Masukkan nama pengguna atau NPK" required autofocus>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Nama Lengkap <span style="color:var(--red);">*</span></label>
                <input type="text" name="name" class="form-control" placeholder="Masukkan nama lengkap" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Kata Sandi</label>
                <div style="position:relative;">
                    <input type="password" name="password" id="password" class="form-control" placeholder="Kosongkan untuk login NPK" style="padding-right:45px;">
                    <button type="button" onclick="togglePassword()" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:#999; cursor:pointer; font-size:18px; min-height:auto; padding:5px;">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <small style="color:#999;">Kosongkan jika Anda karyawan (login dengan NPK). Wajib diisi untuk akun HR/Manajer.</small>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Cabang <span style="color:var(--red);">*</span></label>
                <select name="branch" class="form-control" required>
                    <option value="">Pilih cabang...</option>
                    <option>Jakarta Pusat</option><option>Jakarta Selatan</option><option>Jakarta Utara</option>
                    <option>Bandung</option><option>Surabaya</option><option>Medan</option>
                    <option>Makassar</option><option>Denpasar</option><option>Palembang</option>
                    <option>Balikpapan</option><option>Batam</option><option>Yogyakarta</option>
                    <option>Semarang</option><option>Malang</option><option>Bekasi</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-red btn-full" style="font-size:16px; padding:14px; border-radius:50px; font-weight:700;">
                Masuk
            </button>
        </form>
    </div>
    
    <p class="text-center mt-3" style="font-size:12px; color:#bbb;">
        Lupa kata sandi HR/Manajer? Hubungi admin sistem.
    </p>
</div>

<script>
function togglePassword() {
    const pw = document.getElementById('password');
    const eye = document.getElementById('eyeIcon');
    if (pw.type === 'password') { pw.type = 'text'; eye.className = 'fas fa-eye-slash'; }
    else { pw.type = 'password'; eye.className = 'fas fa-eye'; }
}
</script>
{% endblock %}
