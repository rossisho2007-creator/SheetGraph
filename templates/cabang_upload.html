{% extends "base.html" %}
{% block title %}Upload - Cabang{% endblock %}
{% block content %}

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <div>
        <h4 style="color:var(--blue);">🔵 Cabang: {{ session.name }}</h4>
        <small style="color:#666;">Submit new loan applications</small>
    </div>
</div>

<div class="row g-3">
    <div class="col-6">
        <a href="/cabang/scan" style="text-decoration:none;">
            <div class="card-stat blue" style="padding:40px 20px;">
                <div style="font-size:48px;">📸</div>
                <p style="font-weight:700; color:var(--blue); margin-top:8px;">Scan Document</p>
                <small style="color:#666;">Camera or upload</small>
            </div>
        </a>
    </div>
    <div class="col-6">
        <a href="/cabang/form" style="text-decoration:none;">
            <div class="card-stat" style="padding:40px 20px; border-top-color:var(--blue);">
                <div style="font-size:48px;">📝</div>
                <p style="font-weight:700; color:var(--blue); margin-top:8px;">Online Form</p>
                <small style="color:#666;">Fill manually</small>
            </div>
        </a>
    </div>
</div>

<p class="text-center mt-4" style="color:#999; font-size:13px;">
    ⚠️ You can only submit data. Contact HR for questions.
</p>
{% endblock %}
